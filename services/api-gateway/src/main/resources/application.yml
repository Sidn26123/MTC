app:
  api-prefix: /api
  prefix-count: 1

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: identity_service
          uri: http://localhost:8100
          predicates:
            - Path=${app.api-prefix}/identity/**
          filters:
            - StripPrefix= 1
        - id: novel_service
          uri:
            http://localhost:8092
          predicates:
            - Path=${app.api-prefix}/novel/**
          filters:
            - StripPrefix=1
server:
  port: 8889